<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  />
  <title>WebView video test</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    p {
      font-size: 14px;
      color: #666;
      margin: 0 0 16px;
    }

    .videos {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .video-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .video-label {
      font-size: 12px;
      color: #444;
    }

    video {
      width: 100px;
      height: 100px;
      object-fit: cover;
      display: block;
      border-radius: 8px;
      background: #000;
    }
  </style>
</head>
<body>
  <h1>Тест inline video</h1>
  <p>Оба видео 100×100. Должны играть на месте, без fullscreen.</p>

  <div class="videos">
    <div class="video-item">
      <span class="video-label">Удалённое mp4</span>
      <video
        controls
        playsinline
        webkit-playsinline
        preload="metadata"
      >
        <source src="https://mdn.github.io/learning-area/html/multimedia-and-embedding/video-and-audio-content/rabbit320.mp4" type="video/mp4" />
        Ваш браузер не поддерживает video.
      </video>
    </div>

    <div class="video-item">
      <span class="video-label">Локальный webm</span>
      <video
        controls
        playsinline
        webkit-playsinline
        preload="metadata"
      >
        <source src="1.webm" type="video/webm" />
        Ваш браузер не поддерживает video.
      </video>
    </div>
  </div>
</body>
</html>
